<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}BookBuddy — Find your next read{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
{% block head %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <div class="wrap nav-row">
      <a class="brand" href="/">
        <span class="mark">B</span>
        BookBuddy
      </a>
      <ul class="nav-links">
        <li><a href="/">Top 50</a></li>
        <li><a href="/recommend">Recommend</a></li>
      </ul>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="wrap" style="display:flex; justify-content:space-between; flex-wrap:wrap; gap:12px; width:100%;">
      <span>BookBuddy — recommendations built from real reader ratings.</span>
      <span class="fmark">catalog v1.0</span>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
